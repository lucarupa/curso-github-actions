name: Saludo usando variables
on:
  workflow_dispatch:
env:
  DIA_SEMANA: martes
jobs:
  saludos-variables:
    runs-on: ubuntu-latest
    env:
      SALUDO: hola
    steps:
      - name: Saludar
        run: echo "$SALUDO, $NOMBRE. Hoy es $DIA_DE_SEMANA!"
        env:
          NOMBRE: ${{ vars.NOMBRE }}
